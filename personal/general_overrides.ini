# 这些键会覆盖上游 [General] 中的同名设置。
# 198804.xyz 不放进 skip-proxy，因为它是 Cloudflare Tunnel 公网入口，需要保留手动切换能力。
skip-proxy = 192.168.0.0/16,10.0.0.0/8,100.64.0.0/10,172.16.0.0/12,localhost,*.local,captive.apple.com,*.ccb.com,*.abchina.com.cn,*.psbc.com,www.baidu.com,www.163.com

tun-excluded-routes = 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.88.99.0/24, 192.168.0.0/16, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 255.255.255.255/32, 239.255.255.250/32, ff02::fb/128

block-quic = all-proxy
# 个人版不要设置 update-url，避免 Shadowrocket 直接覆盖为上游原版。
