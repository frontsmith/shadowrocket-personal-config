# ==============================
# 1. 总代理入口
# A 订阅 4 个节点严格优先；A 全部不可用后，再进入 long 订阅备用。
# ==============================

PROXY = fallback,A-主用-vl-reality,A-备用-vm-argo,A-备用-vm-ws,A-备用-anytls,B-备用-long,url=http://www.gstatic.com/generate_204,interval=300,timeout=3


# ==============================
# 2. A 订阅 VPS-US
# 严格按用户指定顺序：vl-reality → vm-argo → vm-ws → anytls
# ==============================

A-主用-vl-reality = fallback,VPS-US,use=true,policy-regex-filter=^vl-reality-Front-VPS\.US$,url=http://www.gstatic.com/generate_204,interval=300,timeout=3

A-备用-vm-argo = fallback,VPS-US,use=true,policy-regex-filter=^vm-argo-Front-VPS\.US$,url=http://www.gstatic.com/generate_204,interval=300,timeout=3

A-备用-vm-ws = fallback,VPS-US,use=true,policy-regex-filter=^vm-ws-Front-VPS\.US$,url=http://www.gstatic.com/generate_204,interval=300,timeout=3

A-备用-anytls = fallback,VPS-US,use=true,policy-regex-filter=^anytls-Front-VPS\.US$,url=http://www.gstatic.com/generate_204,interval=300,timeout=3

A-手动选择 = select,VPS-US,use=true,policy-regex-filter=Front-VPS\.US


# ==============================
# 3. B 订阅 long
# 只使用节点名包含“美国”或“日本”的节点；美国优先于日本。
# 其他地区节点不参与自动备用。
# ==============================

B-美国 = url-test,long,use=true,policy-regex-filter=美国,url=http://www.gstatic.com/generate_204,interval=300,tolerance=50,timeout=3

B-日本 = url-test,long,use=true,policy-regex-filter=日本,url=http://www.gstatic.com/generate_204,interval=300,tolerance=50,timeout=3

B-备用-long = fallback,B-美国,B-日本,url=http://www.gstatic.com/generate_204,interval=300,timeout=3

B-手动选择 = select,long,use=true,policy-regex-filter=美国|日本


# ==============================
# 4. 核心海外应用
# 默认均走 PROXY：A 主节点 → A 备用节点 → long 美国 → long 日本
# 如某类服务异常，可在对应策略组里单独手动切换。
# ==============================

AI = select,PROXY,B-备用-long,B-美国,B-日本,B-手动选择,A-手动选择,DIRECT,policy-select-name=PROXY

YouTube = select,PROXY,B-备用-long,B-美国,B-日本,B-手动选择,A-手动选择,DIRECT,policy-select-name=PROXY

Telegram = select,PROXY,B-备用-long,B-美国,B-日本,B-手动选择,A-手动选择,DIRECT,policy-select-name=PROXY

GitHub = select,PROXY,B-备用-long,B-美国,B-日本,B-手动选择,A-手动选择,DIRECT,policy-select-name=PROXY

Google = select,PROXY,B-备用-long,B-美国,B-日本,B-手动选择,A-手动选择,DIRECT,policy-select-name=PROXY

Twitter = select,PROXY,B-备用-long,B-美国,B-日本,B-手动选择,A-手动选择,DIRECT,policy-select-name=PROXY

GlobalMedia = select,PROXY,B-备用-long,B-美国,B-日本,B-手动选择,A-手动选择,DIRECT,policy-select-name=PROXY


# ==============================
# 5. 默认直连，但保留手动切代理
# ==============================

Apple = select,DIRECT,PROXY,B-备用-long,B-手动选择,policy-select-name=DIRECT

Microsoft = select,DIRECT,PROXY,B-备用-long,B-手动选择,policy-select-name=DIRECT

NAS服务 = select,DIRECT,PROXY,B-备用-long,B-手动选择,policy-select-name=DIRECT

Domestic = select,DIRECT,PROXY,policy-select-name=DIRECT

LAN = select,DIRECT,policy-select-name=DIRECT


# ==============================
# 6. 兜底
# ==============================

Final = select,PROXY,DIRECT,B-备用-long,B-手动选择,A-手动选择,policy-select-name=PROXY
