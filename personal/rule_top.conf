# ==============================
# 1. 私人服务 / NAS / Cloudflare Tunnel
# 198804.xyz 及其所有子域名默认直连，必要时可在“NAS服务”策略组手动切代理。
# ==============================

DOMAIN-SUFFIX,198804.xyz,NAS服务


# ==============================
# 2. 局域网 / Tailscale / NAS 内网
# 这些必须直连，不走代理。
# ==============================

DOMAIN,localhost,LAN
DOMAIN-SUFFIX,local,LAN
DOMAIN,captive.apple.com,LAN

IP-CIDR,127.0.0.0/8,LAN,no-resolve
IP-CIDR,10.0.0.0/8,LAN,no-resolve
IP-CIDR,100.64.0.0/10,LAN,no-resolve
IP-CIDR,172.16.0.0/12,LAN,no-resolve
IP-CIDR,192.168.0.0/16,LAN,no-resolve
IP-CIDR,169.254.0.0/16,LAN,no-resolve
IP-CIDR,224.0.0.0/4,LAN,no-resolve
IP-CIDR,255.255.255.255/32,LAN,no-resolve
IP-CIDR6,fc00::/7,LAN,no-resolve
IP-CIDR6,fe80::/10,LAN,no-resolve


# ==============================
# 3. 轻度去广告
# 不开 MITM，不用脚本，只做轻度规则集拦截。
# ==============================

RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/AdvertisingLite/AdvertisingLite.list,REJECT


